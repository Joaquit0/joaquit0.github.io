<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones Nacionales — EleccionesUY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-vibrante: #3b82f6;
            --fondo: #f8fafc;
            --borde-card: rgba(59,130,246,0.15);
            --card-bg: #ffffff;
            --text-muted: #64748b;
            --azul-texto: #1a2a44;
        }
        [data-theme="dark"] {
            --fondo: #0f172a;
            --card-bg: #1e293b;
            --azul-texto: #f1f5f9;
            --borde-card: rgba(255,255,255,0.1);
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--fondo); color: var(--azul-texto); margin: 0; padding: 0; transition: background 0.3s; }

        /* ── HEADER ── */
        header { background: var(--card-bg); border-bottom: 1px solid var(--borde-card); padding: 0.8rem 2rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; gap: 15px; align-items: center; }
        .header-right { display: flex; gap: 10px; align-items: center; justify-content: flex-end; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--azul-vibrante); cursor: pointer; text-decoration: none; }
        .flag-center img { height: 32px; border-radius: 2px; }
        select, .btn-icon { background: var(--card-bg); color: var(--azul-texto); border: 1px solid var(--borde-card); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-family: 'Inter'; }

        /* ── LAYOUT ── */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 520px;
            gap: 0;
            min-height: calc(100vh - 60px);
        }
        @media (max-width: 1100px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* ── MAP PANEL ── */
        .map-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--fondo);
        }
        .map-panel svg {
            width: 100%;
            max-width: 560px;
            height: auto;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.08));
        }

        /* ── SVG map styling ── */
        #uruguay-map path {
            stroke: var(--card-bg);
            stroke-width: 1.5;
            transition: fill 0.4s ease, opacity 0.2s;
            cursor: pointer;
        }
        #uruguay-map path:hover { opacity: 0.8; }
        /* Circles (small depts) are label points — hide the points group, style label circles */
        #uruguay-map #points { display: none; }
        #uruguay-map #label_points circle {
            r: 14;
            stroke: var(--card-bg);
            stroke-width: 2;
            transition: fill 0.4s ease;
            cursor: pointer;
        }
        #uruguay-map #label_points circle:hover { opacity: 0.8; }

        /* Tooltip mapa */
        #map-tooltip {
            position: fixed;
            background: #1a1a2e;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            pointer-events: none;
            z-index: 9999;
            display: none;
            max-width: 200px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        #map-tooltip strong { display: block; font-size: 0.9rem; margin-bottom: 3px; }

        /* ── RIGHT PANEL ── */
        .right-panel {
            border-left: 1px solid var(--borde-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            background: var(--card-bg);
        }

        /* ── SELECTOR DE ELECCIÓN ── */
        .eleccion-selector {
            background: var(--fondo);
            border: 1px solid var(--borde-card);
            border-radius: 14px;
            padding: 16px;
        }
        .eleccion-selector h3 { margin: 0 0 12px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 700; }
        .year-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .year-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--borde-card);
            background: var(--card-bg);
            color: var(--azul-texto);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
        }
        .year-btn:hover { border-color: var(--azul-vibrante); color: var(--azul-vibrante); }
        .year-btn.active { background: var(--azul-vibrante); color: white; border-color: var(--azul-vibrante); }

        /* ── TOGGLE VUELTA / PLEBISCITO ── */
        .vuelta-bar { display: flex; flex-wrap: wrap; gap: 8px; }
        .vuelta-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--borde-card);
            background: var(--card-bg);
            color: var(--azul-texto);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
        }
        .vuelta-btn:hover { border-color: var(--azul-vibrante); }
        .vuelta-btn.active { background: var(--azul-vibrante); color: white; border-color: var(--azul-vibrante); }
        .vuelta-btn.plebiscito.active { background: #7c3aed; border-color: #7c3aed; }

        /* ── CANDIDATOS ── */
        .candidatos-section h3 { margin: 0 0 12px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 700; }

        /* TOP 2 — side by side */
        .cand-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .cand-card {
            background: var(--fondo);
            border: 1.5px solid var(--borde-card);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .cand-card.ganador { border-color: #16a34a; }

        /* Photo */
        .cand-photo-wrap {
            display: flex;
            justify-content: center;
        }
        .cand-photo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--borde-card);
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .cand-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cand-photo-initials {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .cand-info { text-align: center; }
        .cand-nombre { font-weight: 700; font-size: 0.88rem; line-height: 1.3; }
        .cand-vice { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
        .cand-partido { font-size: 0.72rem; font-weight: 600; margin-top: 4px; }
        .cand-votos { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
        .cand-pct { font-size: 1.5rem; font-weight: 800; line-height: 1; text-align: center; }
        .badge-ganador {
            display: inline-block;
            background: #16a34a;
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }
        .barra-cand { height: 5px; background: #e2e8f0; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .barra-cand-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

        /* Candidatos menores */
        .cand-minor-list { display: flex; flex-direction: column; gap: 7px; }
        .cand-minor {
            display: grid;
            grid-template-columns: 44px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--fondo);
            border: 1px solid var(--borde-card);
            border-radius: 10px;
            font-size: 0.82rem;
        }
        .cand-minor-photo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .cand-minor-photo-initials {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .cand-minor-nombre { font-weight: 600; }
        .cand-minor-sub { font-size: 0.7rem; color: var(--text-muted); }
        .cand-minor-pct { font-weight: 700; font-size: 0.85rem; }

        /* Plebiscito */
        .plebiscito-info { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; padding: 10px 14px; background: var(--fondo); border-radius: 10px; border: 1px solid var(--borde-card); }
        .pleb-result { display: flex; flex-direction: column; gap: 8px; }
        .pleb-opcion {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--borde-card);
            background: var(--fondo);
        }
        .pleb-opcion.ganador-pleb { border-color: #16a34a; }
        .pleb-opcion-nombre { font-weight: 600; font-size: 0.88rem; }
        .pleb-opcion-sub { font-size: 0.72rem; color: var(--text-muted); }
        .pleb-opcion-pct { font-size: 1.2rem; font-weight: 800; }
        .pleb-barra { height: 5px; background: #e2e8f0; border-radius: 4px; margin-top: 6px; overflow: hidden; grid-column: 1 / -1; }
        .pleb-barra-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

        /* Leyenda mapa */
        .leyenda-mapa { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 12px; }
        .leyenda-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-muted); }
        .leyenda-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>

    'Durazno':       'UYDU', 'Flores':       'UYFS', 'Florida':      'UYFD',
    'Lavalleja':     'UYLA'
};

/* ════════════════════════════════════════════
   ESTADO
════════════════════════════════════════════ */
let currentLang    = localStorage.getItem('uruvoto-lang') || 'es';
let selectedAnio   = ELECCIONES[ELECCIONES.length - 1].anio;
let selectedVuelta = 0;
let selectedPleb   = null;

document.getElementById('lang-select').value = currentLang;

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function fmtVotos(n) { return n.toLocaleString('es-UY'); }
function pctOf(v, total) { return total > 0 ? ((v / total) * 100).toFixed(1) : '0.0'; }
function txt(obj) { return (obj && obj[currentLang]) ? obj[currentLang] : (obj && obj.es) ? obj.es : ''; }
function color(p) { return COLORES[p] || COLORES['default']; }

function getInitials(nombre) {
    return nombre.split(' ').filter(w => w.length > 2).slice(0,2).map(w => w[0]).join('').toUpperCase();
}

function photoHTML(c, size = 72) {
    if (c.foto) {
        return `<img src="${c.foto}" alt="${c.nombre}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:3px solid ${color(c.partido)}33;" onerror="this.parentNode.innerHTML=initialsCircle('${getInitials(c.nombre)}','${color(c.partido)}',${size})">`;
    }
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color(c.partido)};display:flex;align-items:center;justify-content:center;font-size:${size === 72 ? '1.1' : '0.75'}rem;font-weight:700;color:white;border:3px solid ${color(c.partido)}55;">${getInitials(c.nombre)}</div>`;
}

/* ════════════════════════════════════════════
   RENDER YEARS
════════════════════════════════════════════ */
function renderYears() {
    const grid = document.getElementById('year-grid');
    grid.innerHTML = '';
    ELECCIONES.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'year-btn' + (e.anio === selectedAnio ? ' active' : '');
        btn.textContent = e.anio;
        btn.onclick = () => { selectedAnio = e.anio; selectedVuelta = 0; selectedPleb = null; renderAll(); };
        grid.appendChild(btn);
    });
}

/* ════════════════════════════════════════════
   RENDER VUELTA BAR
════════════════════════════════════════════ */
function renderVueltaBar() {
    const bar = document.getElementById('vuelta-bar');
    bar.innerHTML = '';
    const elec = ELECCIONES.find(e => e.anio === selectedAnio);
    if (!elec) return;
    elec.vueltas.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'vuelta-btn' + (selectedPleb === null && selectedVuelta === i ? ' active' : '');
        btn.textContent = txt(v.nombre);
        btn.onclick = () => { selectedVuelta = i; selectedPleb = null; renderCandidatos(); renderMapa(); };
        bar.appendChild(btn);
    });
    elec.plebiscitos.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'vuelta-btn plebiscito' + (selectedPleb === i ? ' active' : '');
        btn.textContent = txt(p.nombre);
        btn.onclick = () => { selectedPleb = i; renderCandidatos(); renderMapa(); };
        bar.appendChild(btn);
    });
}

/* ════════════════════════════════════════════
   RENDER MAPA
════════════════════════════════════════════ */
const DEFAULT_FILL = () => document.body.getAttribute('data-theme') === 'dark' ? '#334155' : '#cbd5e1';

function renderMapa() {
    const elec = ELECCIONES.find(e => e.anio === selectedAnio);
    if (!elec) return;

    let mapaData = {};
    if (selectedPleb !== null) {
        mapaData = elec.plebiscitos[selectedPleb].mapa || {};
    } else {
        mapaData = elec.vueltas[selectedVuelta]?.mapa || {};
    }

    // Reset all elements to default
    document.querySelectorAll('#uruguay-map #features path, #uruguay-map #label_points circle').forEach(el => {
        el.style.fill = DEFAULT_FILL();
    });

    // Color by partido
    Object.entries(mapaData).forEach(([depto, partidoId]) => {
        const svgId = DEPTO_ID[depto];
        if (!svgId) return;
        const c = color(partidoId);
        // features path
        const path = document.querySelector(`#uruguay-map #features path#${svgId}`);
        if (path) path.style.fill = c;
        // label circle
        const circle = document.querySelector(`#uruguay-map #label_points circle#${svgId}`);
        if (circle) circle.style.fill = c;
    });

    // Leyenda
    const partidos = [...new Set(Object.values(mapaData))];
    const leyenda = document.getElementById('leyenda-mapa');
    leyenda.innerHTML = '';
    partidos.forEach(p => {
        leyenda.innerHTML += `<div class="leyenda-item"><div class="leyenda-dot" style="background:${color(p)}"></div><span>${PARTIDO_NOMBRES[p] || p}</span></div>`;
    });
}

/* ════════════════════════════════════════════
   TOOLTIP MAPA
════════════════════════════════════════════ */
const tooltip = document.getElementById('map-tooltip');

function setupTooltips() {
    document.querySelectorAll('#uruguay-map #features path, #uruguay-map #label_points circle').forEach(el => {
        el.addEventListener('mousemove', e => {
            const name = el.getAttribute('name');
            const elec = ELECCIONES.find(ev => ev.anio === selectedAnio);
            let mapaData = {};
            if (selectedPleb !== null && elec) {
                mapaData = elec.plebiscitos[selectedPleb].mapa || {};
            } else if (elec) {
                mapaData = elec.vueltas[selectedVuelta]?.mapa || {};
            }
            const partidoId = mapaData[name];
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 14) + 'px';
            tooltip.style.top  = (e.clientY - 10) + 'px';
            tooltip.innerHTML = `<strong>${name}</strong>${partidoId ? `<span style="color:${color(partidoId)}">${PARTIDO_NOMBRES[partidoId] || partidoId}</span>` : '<span style="color:#94a3b8">Sin datos</span>'}`;
        });
        el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    });
}

/* ════════════════════════════════════════════
   RENDER CANDIDATOS / PLEBISCITO
════════════════════════════════════════════ */
function renderCandidatos() {
    const elec = ELECCIONES.find(e => e.anio === selectedAnio);
    const sec = document.getElementById('candidatos-section');
    sec.classList.remove('fade-in');
    void sec.offsetWidth;
    sec.classList.add('fade-in');
    const content = document.getElementById('cand-content');
    const lbl = document.getElementById('lbl-candidatos');
    content.innerHTML = '';

    if (selectedPleb !== null) {
        lbl.textContent = currentLang === 'es' ? 'Plebiscito' : 'Plebiscite';
        const pleb = elec.plebiscitos[selectedPleb];
        const total = pleb.opciones.reduce((s, o) => s + o.votos, 0);
        content.innerHTML += `<p class="plebiscito-info">${txt(pleb.descripcion)}</p>`;
        let html = '<div class="pleb-result">';
        const maxVotos = Math.max(...pleb.opciones.map(o => o.votos));
        pleb.opciones.forEach(op => {
            const pct = pctOf(op.votos, total);
            const isWinner = op.votos === maxVotos;
            html += `<div class="pleb-opcion ${isWinner ? 'ganador-pleb' : ''}">
                <div><div class="pleb-opcion-nombre">${txt(op.nombre)}</div>
                <div class="pleb-opcion-sub">${fmtVotos(op.votos)} votos</div></div>
                <div class="pleb-opcion-pct" style="color:${op.color}">${pct}%</div>
                <div class="pleb-barra"><div class="pleb-barra-fill" style="width:${pct}%; background:${op.color}"></div></div>
            </div>`;
        });
        html += '</div>';
        content.innerHTML += html;
        return;
    }

    lbl.textContent = currentLang === 'es' ? 'Candidatos' : 'Candidates';
    const vuelta = elec.vueltas[selectedVuelta];
    if (!vuelta) return;

    const cands = [...vuelta.candidatos].sort((a,b) => b.votos - a.votos);
    const total = cands.reduce((s, c) => s + c.votos, 0);
    const top2 = cands.slice(0, 2);
    const rest = cands.slice(2);

    // TOP 2 — side by side
    let topHtml = '<div class="cand-top">';
    top2.forEach(c => {
        const pct = pctOf(c.votos, total);
        topHtml += `
        <div class="cand-card ${c.ganador ? 'ganador' : ''}" style="border-top: 4px solid ${color(c.partido)}">
            <div class="cand-photo-wrap">${photoHTML(c, 72)}</div>
            <div class="cand-info">
                <div class="cand-nombre">${c.nombre}</div>
                ${c.vice ? `<div class="cand-vice">Vice: ${c.vice}</div>` : ''}
                <div class="cand-partido" style="color:${color(c.partido)}">${c.partido}</div>
                <div class="cand-votos">${fmtVotos(c.votos)} votos</div>
                ${c.ganador ? '<span class="badge-ganador">Ganador</span>' : ''}
            </div>
            <div class="cand-pct" style="color:${color(c.partido)}">${pct}%</div>
            <div class="barra-cand"><div class="barra-cand-fill" style="width:${pct}%; background:${color(c.partido)}"></div></div>
        </div>`;
    });
    topHtml += '</div>';
    content.innerHTML += topHtml;

    // Resto
    if (rest.length > 0) {
        let minorHtml = '<div class="cand-minor-list">';
        rest.forEach(c => {
            const pct = pctOf(c.votos, total);
            minorHtml += `
            <div class="cand-minor">
                ${photoHTML(c, 36)}
                <div>
                    <div class="cand-minor-nombre">${c.nombre}</div>
                    <div class="cand-minor-sub">${c.partido} · ${fmtVotos(c.votos)} votos</div>
                </div>
                <div class="cand-minor-pct" style="color:${color(c.partido)}">${pct}%</div>
            </div>`;
        });
        minorHtml += '</div>';
        content.innerHTML += minorHtml;
    }
}

/* ════════════════════════════════════════════
   RENDER ALL
════════════════════════════════════════════ */
function renderAll() {
    renderYears();
    renderVueltaBar();
    renderMapa();
    renderCandidatos();
}

/* ════════════════════════════════════════════
   IDIOMA / TEMA
════════════════════════════════════════════ */
function changeLanguage() {
    currentLang = document.getElementById('lang-select').value;
    localStorage.setItem('uruvoto-lang', currentLang);
    renderAll();
}
function toggleDarkMode() {
    const dark = document.body.getAttribute('data-theme') !== 'dark';
    document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
    localStorage.setItem('uruvoto-theme', dark ? 'dark' : 'light');
    document.getElementById('dark-btn').innerText = dark ? '☀️' : '🌙';
    renderMapa();
}

/* ── INIT ── */
const isDarkInit = document.body.getAttribute('data-theme') === 'dark';
document.getElementById('dark-btn').innerText = isDarkInit ? '☀️' : '🌙';
renderAll();
setupTooltips();
</script>
